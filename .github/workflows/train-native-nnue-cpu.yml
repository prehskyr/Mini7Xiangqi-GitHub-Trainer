name: Train native Mini7 NNUE on GitHub CPU

on:
  workflow_dispatch:
    inputs:
      epoch_positions:
        description: Positions processed in this training round
        required: true
        default: "200000"
      validation_positions:
        description: Positions processed during validation
        required: true
        default: "20000"
      batch_size:
        description: CPU batch size
        required: true
        default: "64"
      lambda_eval:
        description: Loss mixture, 1=search score and 0=game result
        required: true
        default: "0.80"
      learning_rate_note:
        description: Informational label (optimizer LR is controlled by official model)
        required: false
        default: "official-default"

permissions:
  contents: write

concurrency:
  group: mini7-native-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      TRAINER_COMMIT: b15df38a9aae8ab9b40b2378020b3099c7c5d179
      GH_TOKEN: ${{ github.token }}
      PYTHONUNBUFFERED: "1"
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git zstd

      - name: Install CPU training dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.1.2"
          python -m pip install "numpy<2" chess matplotlib "pytorch-lightning==1.9.5" \
            "torchmetrics==0.11.4" tensorboard

      - name: Fetch and patch pinned official trainer
        run: |
          git clone https://github.com/fairy-stockfish/variant-nnue-pytorch.git trainer
          git -C trainer checkout "$TRAINER_COMMIT"
          python native/scripts/patch_trainer_cpu.py trainer

      - name: Download and install published Mini7 assets
        run: |
          set -euo pipefail
          mkdir -p data release-config

          gh release download mini7-native-data \
            --pattern 'mini7-train-*.bin.zst' \
            --dir data \
            --clobber

          gh release download mini7-native-data \
            --pattern 'mini7-validation-*.bin.zst' \
            --dir data \
            --clobber

          gh release download mini7-native-data \
            --pattern 'variant.h' \
            --dir release-config \
            --clobber

          gh release download mini7-native-data \
            --pattern 'variant.py' \
            --dir release-config \
            --clobber

          test -n "$(find data -name 'mini7-train-*.bin.zst' -print -quit)"
          test -n "$(find data -name 'mini7-validation-*.bin.zst' -print -quit)"
          test -s release-config/variant.h
          test -s release-config/variant.py

          install -m 0644 release-config/variant.h trainer/variant.h
          install -m 0644 release-config/variant.py trainer/variant.py
          python -m py_compile trainer/variant.py

      - name: Assemble binary datasets
        run: |
          set -euo pipefail
          zstd -dc data/mini7-train-*.bin.zst > trainer/train.bin
          zstd -dc data/mini7-validation-*.bin.zst > trainer/validation.bin
          test -s trainer/train.bin
          test -s trainer/validation.bin
          ls -lh trainer/train.bin trainer/validation.bin

      - name: Build official fast data loader
        working-directory: trainer
        run: |
          set -euo pipefail
          cmake . -Bbuild -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$PWD"
          cmake --build build --config Release --target install -j2
          ls -l *training_data_loader*

      - name: Preflight patched trainer
        working-directory: trainer
        run: |
          set -euo pipefail
          python test_cpu_backend.py
          python train.py --help > train-help.txt
          python serialize.py --help > serialize-help.txt
          grep -q -- '--accelerator' train-help.txt
          grep -q -- '--batch-size' train-help.txt
          grep -q -- '--features' train-help.txt
          grep -q -- '--features' serialize-help.txt

      - name: Restore checkpoint and plan exactly one additional epoch
        env:
          EPOCH_POSITIONS: ${{ inputs.epoch_positions }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          set -euo pipefail
          mkdir -p resume

          gh release download mini7-native-nnue-state \
            --pattern 'latest.ckpt' \
            --dir resume \
            --clobber 2>/dev/null || true

          python - <<'PY'
          import math
          import os
          from pathlib import Path

          import torch

          checkpoint = Path("resume/latest.ckpt")
          if checkpoint.is_file() and checkpoint.stat().st_size > 0:
              state = torch.load(checkpoint, map_location="cpu")
              base_epoch = int(state.get("epoch", -1))
              base_global_step = int(state.get("global_step", 0))
              target_max_epochs = base_epoch + 2
              resume_arg = f"--resume_from_checkpoint {checkpoint.resolve()}"
              resumed = 1
              print(
                  f"Resume checkpoint: completed_epoch={base_epoch}, "
                  f"global_step={base_global_step}"
              )
          else:
              base_epoch = -1
              base_global_step = 0
              target_max_epochs = 1
              resume_arg = ""
              resumed = 0
              print("No checkpoint exists; starting the first native network.")

          epoch_positions = int(os.environ["EPOCH_POSITIONS"])
          batch_size = int(os.environ["BATCH_SIZE"])
          expected_step_increment = math.ceil(epoch_positions / batch_size)

          env_file = Path(os.environ["GITHUB_ENV"])
          with env_file.open("a", encoding="utf-8") as f:
              f.write(f"BASE_EPOCH={base_epoch}\n")
              f.write(f"BASE_GLOBAL_STEP={base_global_step}\n")
              f.write(f"TARGET_MAX_EPOCHS={target_max_epochs}\n")
              f.write(f"EXPECTED_STEP_INCREMENT={expected_step_increment}\n")
              f.write(f"RESUMED={resumed}\n")
              f.write(f"RESUME_ARG={resume_arg}\n")

          print(
              f"Training plan: target_max_epochs={target_max_epochs}, "
              f"expected_new_steps={expected_step_increment}"
          )
          PY

      - name: Train exactly one resumable CPU epoch
        working-directory: trainer
        shell: bash
        run: |
          set -euo pipefail

          python train.py train.bin validation.bin \
            --accelerator cpu \
            --devices 1 \
            --max_epochs "$TARGET_MAX_EPOCHS" \
            --batch-size '${{ inputs.batch_size }}' \
            --threads 4 \
            --num-workers 0 \
            --epoch-size '${{ inputs.epoch_positions }}' \
            --validation-size '${{ inputs.validation_positions }}' \
            --random-fen-skipping 0 \
            --lambda '${{ inputs.lambda_eval }}' \
            --features 'HalfKAv2^' \
            --default_root_dir "$GITHUB_WORKSPACE/training-run" \
            --log_every_n_steps 10 \
            $RESUME_ARG

      - name: Select checkpoint, verify progress, and serialize native NNUE
        run: |
          set -euo pipefail

          CHECKPOINT="$(find training-run -name '*.ckpt' -type f -printf '%T@ %p\n' | sort -nr | head -1 | cut -d' ' -f2-)"

          if test -z "$CHECKPOINT"; then
            echo "::error::Training returned without writing a new checkpoint."
            find training-run -maxdepth 6 -type f -print || true
            exit 1
          fi

          export CHECKPOINT
          python - <<'PY'
          import os
          import torch

          path = os.environ["CHECKPOINT"]
          state = torch.load(path, map_location="cpu")
          new_epoch = int(state.get("epoch", -1))
          new_global_step = int(state.get("global_step", 0))
          base_epoch = int(os.environ["BASE_EPOCH"])
          base_global_step = int(os.environ["BASE_GLOBAL_STEP"])
          target_epoch = int(os.environ["TARGET_MAX_EPOCHS"]) - 1

          print(
              f"New checkpoint: epoch={new_epoch}, global_step={new_global_step}; "
              f"previous epoch={base_epoch}, previous global_step={base_global_step}"
          )

          if new_epoch < target_epoch:
              raise RuntimeError(
                  f"Checkpoint epoch did not advance to target: "
                  f"new={new_epoch}, target={target_epoch}"
              )
          if new_global_step <= base_global_step:
              raise RuntimeError(
                  f"Checkpoint global_step did not advance: "
                  f"new={new_global_step}, previous={base_global_step}"
              )
          PY

          cp "$CHECKPOINT" latest.ckpt

          cd trainer
          python serialize.py \
            "$GITHUB_WORKSPACE/latest.ckpt" \
            "$GITHUB_WORKSPACE/mini7xiangqi-candidate.nnue" \
            --features 'HalfKAv2^' \
            --description "Mini7 native NNUE GitHub run ${GITHUB_RUN_NUMBER}"

          test -s "$GITHUB_WORKSPACE/mini7xiangqi-candidate.nnue"

      - name: Build native engine and load-test exported network
        working-directory: native/engine/src
        run: make -j2 ARCH=x86-64-modern COMP=gcc largeboards=yes nnue=no build

      - name: Verify NNUE inside the search tree
        run: python3 native/scripts/verify_nnue_load.py native/engine/src/stockfish mini7xiangqi-candidate.nnue

      - name: Record training state
        run: |
          set -euo pipefail

          export LATEST_CHECKPOINT="$GITHUB_WORKSPACE/latest.ckpt"
          read -r ENDING_EPOCH ENDING_GLOBAL_STEP < <(
            python - <<'PY'
          import os
          import torch
          state = torch.load(os.environ["LATEST_CHECKPOINT"], map_location="cpu")
          print(int(state.get("epoch", -1)), int(state.get("global_step", 0)))
          PY
          )

          sha256sum latest.ckpt mini7xiangqi-candidate.nnue > SHA256SUMS.txt

          cat > native-training-state.json <<EOF
          {
            "run_number": ${GITHUB_RUN_NUMBER},
            "run_id": ${GITHUB_RUN_ID},
            "source_commit": "${GITHUB_SHA}",
            "trainer_commit": "${TRAINER_COMMIT}",
            "variant": "mini7xiangqi",
            "epoch_positions": ${{ inputs.epoch_positions }},
            "validation_positions": ${{ inputs.validation_positions }},
            "batch_size": ${{ inputs.batch_size }},
            "lambda_eval": ${{ inputs.lambda_eval }},
            "backend": "github-hosted-cpu",
            "resumed": ${RESUMED},
            "starting_epoch": ${BASE_EPOCH},
            "ending_epoch": ${ENDING_EPOCH},
            "starting_global_step": ${BASE_GLOBAL_STEP},
            "ending_global_step": ${ENDING_GLOBAL_STEP},
            "network": "mini7xiangqi-candidate.nnue"
          }
          EOF

      - name: Publish rolling checkpoint and candidate network
        run: |
          set -euo pipefail

          gh release view mini7-native-nnue-state >/dev/null 2>&1 || \
            gh release create mini7-native-nnue-state \
              --target "$GITHUB_SHA" \
              --title "Mini7 native NNUE state" \
              --notes "Rolling CPU checkpoint and native candidate network."

          gh release upload mini7-native-nnue-state \
            latest.ckpt \
            mini7xiangqi-candidate.nnue \
            native-training-state.json \
            SHA256SUMS.txt \
            --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: mini7-native-nnue-run-${{ github.run_number }}
          path: |
            latest.ckpt
            mini7xiangqi-candidate.nnue
            native-training-state.json
            SHA256SUMS.txt
            training-run/lightning_logs/**
          if-no-files-found: error
          retention-days: 30
