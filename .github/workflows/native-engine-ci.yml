name: Native Mini7 engine CI

on:
  push:
    branches: [main, master]
    paths:
      - "native/engine/**"
      - "native/scripts/smoke_native_engine.py"
      - ".github/workflows/native-engine-ci.yml"
  pull_request:
    paths:
      - "native/engine/**"
      - "native/scripts/smoke_native_engine.py"
      - ".github/workflows/native-engine-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux native engine
        working-directory: native/engine/src
        run: make -j2 ARCH=x86-64-modern COMP=gcc largeboards=yes nnue=no build
      - name: Rule and protocol smoke test
        run: python3 native/scripts/smoke_native_engine.py native/engine/src/stockfish
      - name: Package Linux engine
        run: |
          mkdir -p dist/linux
          cp native/engine/src/stockfish dist/linux/Mini7-Fairy-Stockfish
          cp native/engine/Copying.txt dist/linux/LICENSE-GPLv3.txt
          printf '%s\n' 'Variant: mini7xiangqi' 'External NNUE: EvalFile' > dist/linux/README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mini7-native-linux-${{ github.run_number }}
          path: dist/linux
          retention-days: 14

  windows:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
      - name: Build Windows native engine
        shell: msys2 {0}
        working-directory: native/engine/src
        run: make -j2 ARCH=x86-64-modern COMP=mingw largeboards=yes nnue=no build
      - name: Rule and protocol smoke test
        shell: msys2 {0}
        run: python native/scripts/smoke_native_engine.py native/engine/src/stockfish.exe
      - name: Package Windows engine
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Copy-Item native/engine/src/stockfish.exe dist/windows/Mini7-Fairy-Stockfish.exe
          Copy-Item native/engine/Copying.txt dist/windows/LICENSE-GPLv3.txt
          @('Variant: mini7xiangqi','External NNUE: EvalFile') | Set-Content -Encoding utf8 dist/windows/README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mini7-native-windows-${{ github.run_number }}
          path: dist/windows
          retention-days: 14
