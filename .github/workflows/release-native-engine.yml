name: Package native Mini7 Windows engine

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Train native Mini7 NNUE on GitHub CPU
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: mini7-native-windows-package
  cancel-in-progress: false

jobs:
  package:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python

      - name: Download latest trained native network
        shell: pwsh
        run: |
          gh release download mini7-native-nnue-state `
            --pattern mini7xiangqi-candidate.nnue `
            --dir . `
            --clobber

          if (-not (Test-Path mini7xiangqi-candidate.nnue)) {
            throw 'No trained native candidate network exists.'
          }

      - name: Build Windows native engine
        shell: msys2 {0}
        working-directory: native/engine/src
        run: make -j2 ARCH=x86-64-modern COMP=mingw largeboards=yes nnue=no build

      - name: Verify network load in Windows engine
        shell: msys2 {0}
        run: python native/scripts/verify_nnue_load.py native/engine/src/stockfish.exe mini7xiangqi-candidate.nnue

      - name: Create Windows package
        shell: pwsh
        run: |
          $dir = 'Mini7-Fairy-Stockfish-Windows-x64'
          New-Item -ItemType Directory -Force $dir | Out-Null

          Copy-Item native/engine/src/stockfish.exe "$dir/Mini7-Fairy-Stockfish.exe"
          Copy-Item mini7xiangqi-candidate.nnue "$dir/mini7xiangqi-candidate.nnue"
          Copy-Item native/engine/Copying.txt "$dir/LICENSE-GPLv3.txt"

          @'
          Mini7 native Fairy-Stockfish engine

          Required UCI options:
            UCI_Variant = mini7xiangqi
            EvalFile    = mini7xiangqi-candidate.nnue
            Use NNUE    = true

          Keep Mini7-Fairy-Stockfish.exe and mini7xiangqi-candidate.nnue
          in the same directory unless the GUI supplies an absolute EvalFile path.
          '@ | Set-Content -Encoding utf8 "$dir/README.txt"

          $engineHash = (Get-FileHash "$dir/Mini7-Fairy-Stockfish.exe" -Algorithm SHA256).Hash.ToLower()
          $netHash = (Get-FileHash "$dir/mini7xiangqi-candidate.nnue" -Algorithm SHA256).Hash.ToLower()

          $info = [ordered]@{
            source_commit = $env:GITHUB_SHA
            workflow_run_id = [int64]$env:GITHUB_RUN_ID
            workflow_run_number = [int]$env:GITHUB_RUN_NUMBER
            variant = 'mini7xiangqi'
            engine_sha256 = $engineHash
            network_sha256 = $netHash
            build = 'windows-2022 / MSYS2 UCRT64 / x86-64-modern'
          }

          $info | ConvertTo-Json | Set-Content -Encoding utf8 "$dir/BUILD_INFO.json"

          Copy-Item "$dir/Mini7-Fairy-Stockfish.exe" .
          Copy-Item "$dir/README.txt" Mini7-Windows-README.txt
          Copy-Item "$dir/BUILD_INFO.json" Mini7-Windows-BUILD_INFO.json

          Compress-Archive `
            -Path "$dir/*" `
            -DestinationPath Mini7-Fairy-Stockfish-Windows-x64.zip `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mini7-Fairy-Stockfish-Windows-x64-${{ github.run_number }}
          path: |
            Mini7-Fairy-Stockfish.exe
            mini7xiangqi-candidate.nnue
            Mini7-Fairy-Stockfish-Windows-x64.zip
            Mini7-Windows-README.txt
            Mini7-Windows-BUILD_INFO.json
          retention-days: 30

      - name: Add EXE and ZIP to rolling NNUE release
        shell: pwsh
        run: |
          gh release upload mini7-native-nnue-state `
            Mini7-Fairy-Stockfish.exe `
            Mini7-Fairy-Stockfish-Windows-x64.zip `
            Mini7-Windows-README.txt `
            Mini7-Windows-BUILD_INFO.json `
            --clobber

      - name: Publish reproducible Windows build release
        shell: pwsh
        run: |
          $tag = "mini7-native-build-$env:GITHUB_RUN_ID"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target $env:GITHUB_SHA `
              --title "Mini7 native Windows build $env:GITHUB_RUN_NUMBER" `
              --notes "Windows engine compiled after a successful native NNUE training run."
          }

          gh release upload $tag `
            Mini7-Fairy-Stockfish.exe `
            mini7xiangqi-candidate.nnue `
            Mini7-Fairy-Stockfish-Windows-x64.zip `
            Mini7-Windows-README.txt `
            Mini7-Windows-BUILD_INFO.json `
            --clobber
